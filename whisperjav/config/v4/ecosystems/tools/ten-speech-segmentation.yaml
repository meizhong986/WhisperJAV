# =============================================================================
# TEN VAD Speech Segmentation Tool Configuration
# =============================================================================
# TEN Framework VAD - lightweight, fast voice activity detection.
# Suitable for real-time and streaming applications.
# Requires: pip install -U git+https://github.com/TEN-framework/ten-vad.git
# =============================================================================

schemaVersion: v1
kind: Tool

metadata:
  name: ten-speech-segmentation
  displayName: "TEN VAD"
  description: |
    Speech segmentation using TEN Framework VAD.
    Lightweight neural VAD model for fast speech detection.
    Processes audio frame-by-frame at 16kHz with configurable hop size.
    Best for real-time and streaming applications.
  version: "1.0.0"
  tags:
    - speech-segmentation
    - ten
    - vad
    - lightweight
    - realtime
  dependencies:
    - "ten-vad @ git+https://github.com/TEN-framework/ten-vad.git"

tool_type: speech_segmentation

# =============================================================================
# Input/Output Contract
# =============================================================================
contract:
  input:
    audio: "np.ndarray | Path | str"
    sample_rate: int
  output:
    segments: "List[SpeechSegment]"
    groups: "List[List[SpeechSegment]]"

# =============================================================================
# Tool Parameters (Balanced preset as default)
# =============================================================================
spec:
  # --- Core VAD Parameters ---
  threshold: 0.32              # v1.8.10-hf2: 0.25→0.32, tightened per forensic analysis
  hop_size: 256

  # --- Duration Filters ---
  min_speech_duration_ms: 150  # v1.8.10-hf1: 100→150, match Silero for consistency
  min_silence_duration_ms: 150 # v1.8.10-hf1: 100→150, match Silero — now implemented in backend
  max_speech_duration_s: 6     # v1.8.10-hf2: added, limits individual segment length (split at prob minima)

  # --- Segment Padding ---
  # end_pad extends segment end to capture trailing speech.
  # start_pad is set to 0 because TEN's 16ms frame already captures the speech
  # onset, and pre-speech padding causes ~Nms timestamp drift in Whisper/ASR
  # (Whisper can't reliably detect short pre-speech silence). See #163.
  start_pad_ms: 0
  end_pad_ms: 200    # Shift segment end later by 200ms

  # --- Segment Grouping ---
  chunk_threshold_s: 1.0
  max_group_duration_s: 8      # v1.8.10-hf1: 29.0→8, hard cap for segment size

# =============================================================================
# Sensitivity Presets
# =============================================================================
presets:
  # Conservative: Higher threshold, fewer false positives
  # Best for: Clean audio, studio recordings
  # Higher end_pad compensates for late detection at threshold 0.45.
  conservative:
    threshold: 0.42               # v1.8.10-hf2: 0.45→0.42, relaxed per forensic analysis
    min_speech_duration_ms: 200
    min_silence_duration_ms: 200
    max_speech_duration_s: 5      # v1.8.10-hf2: added, match Silero v6.2 pattern
    max_group_duration_s: 7
    start_pad_ms: 0
    end_pad_ms: 300

  # Balanced: Default settings for general use
  balanced: {}  # Uses spec defaults

  # Aggressive: Lower threshold, maximum capture
  # Best for: Noisy audio, soft speech
  # Lower end_pad — threshold 0.10 already detects speech early.
  aggressive:
    threshold: 0.22               # v1.8.10-hf2: 0.10→0.22, reduce noise capture per forensic analysis
    min_speech_duration_ms: 100
    min_silence_duration_ms: 100  # v1.8.10-hf2: 80→100, reduce micro-fragmentation
    max_speech_duration_s: 7      # v1.8.10-hf2: added, match Silero v6.2 pattern
    max_group_duration_s: 9
    start_pad_ms: 0
    end_pad_ms: 100

# =============================================================================
# GUI Hints
# =============================================================================
gui:
  threshold:
    widget: slider
    label: "Speech Threshold"
    description: "Probability threshold to detect speech (lower = more sensitive)"
    min: 0.1
    max: 0.9
    step: 0.05
    data_type: float
    group: detection

  hop_size:
    widget: dropdown
    label: "Hop Size"
    description: "Frame size in samples at 16kHz (160=10ms, 256=16ms, 512=32ms)"
    options:
      - "160"
      - "256"
      - "512"
    data_type: int
    group: processing

  min_speech_duration_ms:
    widget: spinner
    label: "Min Speech Duration (ms)"
    description: "Minimum speech segment duration to keep"
    min: 10
    max: 500
    step: 10
    data_type: int
    group: filters

  min_silence_duration_ms:
    widget: spinner
    label: "Min Silence Duration (ms)"
    description: "Minimum silence gap to keep segments separate (shorter gaps are merged)"
    min: 10
    max: 500
    step: 10
    data_type: int
    group: filters

  max_speech_duration_s:
    widget: slider
    label: "Max Speech Duration (s)"
    description: "Split long speech segments at quiet points (prevents oversized chunks)"
    min: 1.0
    max: 30.0
    step: 0.5
    data_type: float
    unit: "s"
    group: filters

  chunk_threshold_s:
    widget: slider
    label: "Group Gap Threshold (s)"
    description: "Maximum gap to group consecutive segments"
    min: 0.5
    max: 5.0
    step: 0.1
    data_type: float
    group: grouping

  start_pad_ms:
    widget: spinner
    label: "Start Padding (ms)"
    description: "Milliseconds to extend segment start (captures speech onset)"
    min: 0
    max: 500
    step: 10
    data_type: int
    group: padding

  end_pad_ms:
    widget: spinner
    label: "End Padding (ms)"
    description: "Milliseconds to extend segment end (captures speech offset)"
    min: 0
    max: 500
    step: 10
    data_type: int
    group: padding

  max_group_duration_s:
    widget: slider
    label: "Max Group Duration"
    description: "Maximum duration for grouped segments (Whisper 30s context limit)"
    min: 10
    max: 60
    step: 1
    data_type: float
    unit: "s"
    group: grouping

# =============================================================================
# Provider Configuration
# =============================================================================
provider:
  module: whisperjav.modules.speech_segmentation.backends.ten
  class: TenSpeechSegmenter
