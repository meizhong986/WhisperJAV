# =============================================================================
# Silero VAD Speech Segmentation Tool Configuration
# =============================================================================
# Neural VAD using Silero model for speech boundary detection.
# High-quality detection with sensitivity presets for different use cases.
#
# Version is selected via the backend dropdown (Silero v4.0 vs v3.1), not a
# parameter. Defaults shown are for v4.0.
# =============================================================================

schemaVersion: v1
kind: Tool

metadata:
  name: silero-speech-segmentation
  displayName: "Silero VAD"
  description: |
    Speech segmentation using Silero VAD neural network.
    Fast, accurate voice activity detection with configurable sensitivity.
    Version is selected via the backend dropdown (Silero v4.0 vs v3.1),
    not a parameter. Defaults shown are for v4.0.
  version: "1.0.0"
  tags:
    - speech-segmentation
    - silero
    - vad
    - neural
  dependencies:
    - "silero-vad"

tool_type: speech_segmentation

# =============================================================================
# Input/Output Contract
# =============================================================================
contract:
  input:
    audio: "np.ndarray | Path | str"
    sample_rate: int
  output:
    segments: "List[SpeechSegment]"
    groups: "List[List[SpeechSegment]]"

# =============================================================================
# Tool Parameters (Balanced preset as default)
# =============================================================================
spec:
  # --- Core VAD Parameters ---
  # Keys are flat (no "vad." prefix) to match the routing layer (SEGMENTER_PARAMS)
  threshold: 0.28                   # v1.8.10-hf3: 0.18→0.28, retuned for v3.1/v4.0 mega-group prevention
  min_speech_duration_ms: 100
  min_silence_duration_ms: 300
  speech_pad_ms: 400

  # --- Duration Limits ---
  # v1.8.12: tightened max_speech_duration_s 7→5 per JA-subtitle research:
  # majority of JA subtitles are <3s with ~800ms gaps. Tighter caps keep the
  # detector aligned with natural utterance length distribution.
  # NOTE: silero v3.1/v4.0 library does not enforce max_speech_duration_s
  # internally — it is stored on the segmenter for config compatibility but
  # never forwarded to the model. Only max_group_duration_s is enforced here.
  max_speech_duration_s: 5

  # --- Segment Grouping ---
  chunk_threshold_s: 2.5
  # v1.8.12: tightened 9→6. JA-subtitle research shows typical groups span
  # 2-3 subs separated by ~800ms gaps, so a 6s group cap matches reality
  # without forcing artificial splits.
  max_group_duration_s: 6

# =============================================================================
# Sensitivity Presets
# =============================================================================
presets:
  # Conservative: Higher thresholds, fewer false positives
  # Best for: Clean audio, clear speech, minimal background noise
  # v1.8.12: max_speech 6→6, max_group 8→7 (JA-sub-research tight retune,
  # inverted gradient: conservative threshold misses softer onsets, so
  # slightly looser caps let the few detected segments capture full utterances)
  conservative:
    threshold: 0.41
    min_speech_duration_ms: 150
    min_silence_duration_ms: 300
    max_speech_duration_s: 6
    max_group_duration_s: 7
    speech_pad_ms: 500

  # Balanced: Default settings for general use
  # Best for: Mixed content, typical audio quality
  # v1.8.12: spec defaults updated to max_speech=5, max_group=6
  balanced: {}  # Uses spec defaults

  # Aggressive: Maximum detail capture with controlled group sizes
  # Best for: Difficult audio, soft speech, noisy backgrounds
  # v1.8.12: max_speech 8→4, max_group 10→5 (JA-sub-research tight retune,
  # inverted gradient: lower threshold detects more bursts, so tighter caps
  # keep utterances distinct rather than lumped)
  aggressive:
    threshold: 0.18
    min_speech_duration_ms: 30
    min_silence_duration_ms: 300
    max_speech_duration_s: 4
    max_group_duration_s: 5
    speech_pad_ms: 300

# =============================================================================
# GUI Hints
# =============================================================================
# Functional parameters exposed to GUI.
# Not exposed:
#   - max_speech_duration_s: stored but excluded from old Silero API call
#   - version: controlled by factory name (silero vs silero-v3.1), not a parameter
gui:
  threshold:
    widget: slider
    label: "Speech Threshold"
    description: "Probability threshold to detect speech (lower = more sensitive)"
    min: 0.01
    max: 0.5
    step: 0.01
    data_type: float
    group: detection

  min_speech_duration_ms:
    widget: spinner
    label: "Min Speech Duration (ms)"
    description: "Minimum speech segment duration to keep"
    min: 10
    max: 500
    step: 10
    data_type: int
    group: filters

  min_silence_duration_ms:
    widget: spinner
    label: "Min Silence Duration (ms)"
    description: "Minimum silence duration to trigger split"
    min: 100
    max: 1000
    step: 50
    data_type: int
    group: filters

  speech_pad_ms:
    widget: spinner
    label: "Speech Padding (ms)"
    description: "Padding added around detected speech segments"
    min: 0
    max: 1000
    step: 50
    data_type: int
    group: filters

  chunk_threshold_s:
    widget: slider
    label: "Group Gap Threshold (s)"
    description: "Maximum gap to group consecutive segments"
    min: 1.0
    max: 10.0
    step: 0.5
    data_type: float
    group: grouping

  max_group_duration_s:
    widget: slider
    label: "Max Group Duration (s)"
    description: "Maximum duration for a segment group (prevents exceeding Whisper's 30s context window)"
    min: 10.0
    max: 60.0
    step: 1.0
    data_type: float
    group: grouping

# =============================================================================
# Provider Configuration
# =============================================================================
provider:
  module: whisperjav.modules.speech_segmentation.backends.silero
  class: SileroSpeechSegmenter
