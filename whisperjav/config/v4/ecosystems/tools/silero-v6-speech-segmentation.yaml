# =============================================================================
# Silero VAD v6.2 Speech Segmentation Tool Configuration
# =============================================================================
# Silero VAD v6.2 (pip package) - force-splits long speech, hysteresis for
# stable segmentation in noisy audio. Solves TEN VAD's failure to detect
# pauses in fast Japanese dialogue with background audio.
# Requires: pip install silero-vad>=6.2
# =============================================================================

schemaVersion: v1
kind: Tool

metadata:
  name: silero-v6-speech-segmentation
  displayName: "Silero VAD v6.2"
  description: |
    Speech segmentation using Silero VAD v6.2 pip package.
    Key v6.2 features:
    - max_speech_duration_s: Force-splits long speech chunks at internal silences
    - speech_pad_ms: Internal padding (no manual sample-based padding needed)
    The offset (hysteresis) threshold is auto-computed inside silero-vad as
    max(threshold - 0.15, 0.01); not user-tunable.
    JAV-tuned defaults: threshold=0.5, speech_pad_ms=200, min_speech_duration_ms=100.
  version: "1.0.0"
  tags:
    - speech-segmentation
    - silero
    - vad
    - v6-2
    - hysteresis
    - force-split
  dependencies:
    - "silero-vad>=6.2"

tool_type: speech_segmentation

# =============================================================================
# Input/Output Contract
# =============================================================================
contract:
  input:
    audio: "np.ndarray | Path | str"
    sample_rate: int
  output:
    segments: "List[SpeechSegment]"
    groups: "List[List[SpeechSegment]]"

# =============================================================================
# Tool Parameters (Balanced preset as default)
# =============================================================================
spec:
  # --- Core VAD Parameters ---
  threshold: 0.32    # v1.8.10-hf2: 0.35→0.32, relaxed per forensic analysis
  # neg_threshold is intentionally not exposed. silero-vad v6.2 auto-computes
  # it internally as max(threshold - 0.15, 0.01) — kept consistent across runs.

  # --- Duration Filters ---
  min_speech_duration_ms: 150   # v1.8.10-hf1: 100→150, filter noise while preserving short utterances
  # v1.8.12: tightened 6→5 per JA-subtitle research (majority of JA subs are
  # <3s with ~800ms gaps). v6.2 enforces this internally via force-split.
  max_speech_duration_s: 5
  min_silence_duration_ms: 150  # v1.8.10-hf1: 100→150, controls segmentation granularity

  # --- Segment Padding ---
  # speech_pad_ms is handled internally by v6.2 (no manual sample-based padding)
  speech_pad_ms: 250  # Capture Japanese soft onsets and trailing particles/breath tails

  # --- v6.2 max_speech_duration split behavior ---
  min_silence_at_max_speech: 98          # v6.2 default
  use_max_poss_sil_at_max_speech: true   # v6.2 default

  # --- Segment Grouping ---
  chunk_threshold_s: 1.5         # v1.8.10-hf1: 1.0→1.5, controls merging of nearby segments
  # v1.8.12: tightened 8→6. Typical JA dialogue groups span 2-3 subs over
  # ~6s; this matches the natural distribution.
  max_group_duration_s: 6

# =============================================================================
# Sensitivity Presets
# =============================================================================
presets:
  # Conservative: Higher threshold, fewer false positives
  # Best for: Clean audio, studio recordings
  # Higher padding compensates for late detection — threshold 0.42 misses
  # soft onsets, so 350ms padding recovers the clipped edges.
  # v1.8.12: max_speech 5→6, max_group 7→7 (JA-sub-research, inverted gradient)
  conservative:
    threshold: 0.42
    min_speech_duration_ms: 200
    min_silence_duration_ms: 200
    max_speech_duration_s: 6
    max_group_duration_s: 7
    chunk_threshold_s: 1.0
    speech_pad_ms: 350

  # Balanced: Default settings for general use
  # v1.8.12: spec defaults updated to max_speech=5, max_group=6
  balanced: {}  # Uses spec defaults

  # Aggressive: Lower threshold, maximum capture
  # Best for: Noisy audio, soft speech, whispered dialogue
  # v1.8.12: max_speech 7→4, max_group 9→5 (JA-sub-research, inverted gradient:
  # lower threshold catches more bursts, so tighter caps keep them distinct)
  aggressive:
    threshold: 0.12
    min_speech_duration_ms: 100
    min_silence_duration_ms: 100
    max_speech_duration_s: 4
    max_group_duration_s: 5
    chunk_threshold_s: 2.0
    speech_pad_ms: 150

# =============================================================================
# GUI Hints
# =============================================================================
gui:
  threshold:
    widget: slider
    label: "Speech Threshold"
    description: "Probability threshold to detect speech (higher = more selective)"
    min: 0.1
    max: 0.9
    step: 0.05
    data_type: float
    group: detection

  min_speech_duration_ms:
    widget: spinner
    label: "Min Speech Duration (ms)"
    description: "Minimum speech segment duration to keep"
    min: 10
    max: 500
    step: 10
    data_type: int
    group: filters

  max_speech_duration_s:
    widget: slider
    label: "Max Speech Duration (s)"
    description: "Force-split long speech at internal silences (null = inherit from max group)"
    min: 1.0
    max: 60.0
    step: 0.5
    data_type: float
    unit: "s"
    group: filters

  min_silence_duration_ms:
    widget: spinner
    label: "Min Silence Duration (ms)"
    description: "Minimum silence gap to split speech segments"
    min: 10
    max: 500
    step: 10
    data_type: int
    group: filters

  speech_pad_ms:
    widget: spinner
    label: "Speech Padding (ms)"
    description: "Padding around speech segments (handled internally by v6.2)"
    min: 0
    max: 500
    step: 10
    data_type: int
    group: padding

  chunk_threshold_s:
    widget: slider
    label: "Group Gap Threshold (s)"
    description: "Maximum gap to group consecutive segments"
    min: 0.5
    max: 5.0
    step: 0.1
    data_type: float
    group: grouping

  max_group_duration_s:
    widget: slider
    label: "Max Group Duration"
    description: "Maximum duration for grouped segments (pipeline typically overrides)"
    min: 5
    max: 60
    step: 1
    data_type: float
    unit: "s"
    group: grouping

# =============================================================================
# Provider Configuration
# =============================================================================
provider:
  module: whisperjav.modules.speech_segmentation.backends.silero_v6
  class: SileroV6SpeechSegmenter
